[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect social media crawlers to backend for proper meta tags
[[redirects]]
  from = "/post/:slug"
  to = "https://api.sudipsharma.com.np/meta/post/:slug"
  status = 200
  force = false
  conditions = {User-Agent = ["facebookexternalhit", "facebookcatalog", "Facebot", "WhatsApp", "Twitterbot", "LinkedInBot", "Slackbot", "TelegramBot", "Pinterest", "Discordbot", "SkypeUriPreview", "google-structured-data-testing-tool", "Google.*Snippet"]}

# Fallback for all other routes (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
